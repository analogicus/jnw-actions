name: PDF

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-tex:
    runs-on: ubuntu-latest
    container:
      image: wulffern/aicex:26.04_0.1.7
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Checkout jnw-actions
        uses: actions/checkout@v4
        with:
          repository: analogicus/jnw-actions
          path: jnw-actions
      - name: Install dependencies
        shell: bash
        run: |
          python3 -m pip install cicconf
          echo -e "\nGDS2glTF:\n  remote: git@github.com:wulffern/GDS2glTF.git\n  revision: main" >> config.yaml
          cicconf --rundir ../ --config config.yaml clone --https
          python3 -m pip install -r ../GDS2glTF/requirements.txt
          python3 -m pip install cicsim
      - name: Build LaTeX (gendoc, skip pdflatex)
        shell: bash
        env:
          GITHUB_ACTION_PATH: ${{ github.workspace }}/jnw-actions/doc
          SKIP_PDFLATEX: "1"
        run: |
          export PDK_ROOT=/opt/pdk/share/pdk
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "/opt/eda/bin" >> $GITHUB_PATH
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/opt/eda/lib
          git config --global --add safe.directory "$(pwd)"
          export PATH=/opt/eda/bin:$HOME/.local/bin:$PATH
          bash jnw-actions/doc/gendoc
      - name: Prepare pdf-build artifact
        shell: bash
        run: |
          mkdir -p pdf-build
          cp -r docs pdf-build/
          cp -r jnw-actions/doc/templates pdf-build/
      - name: Upload pdf-build
        uses: actions/upload-artifact@v4
        with:
          name: pdf-build
          path: pdf-build

  build-pdf:
    runs-on: ubuntu-latest
    needs: build-tex
    container:
      image: wulffern/aic:2025_latest
      options: --user root
    steps:
      - name: Download pdf-build
        uses: actions/download-artifact@v4
        with:
          name: pdf-build
          path: pdf-build
      - name: Run pdflatex
        shell: bash
        run: |
          cd pdf-build/docs
          TPLDIR="$(cd ../templates && pwd)"
          TEXINPUTS=".:${TPLDIR}:${TEXINPUTS:-}" pdflatex -interaction=nonstopmode -output-directory=assets assets/combined.tex
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: combined-pdf
          path: pdf-build/docs/assets/combined.pdf
          if-no-files-found: warn
